
{% load static %}

{% block scripts %}
    <script defer src = "{% static 'js/action/action.js' %}"></script>
{% endblock scripts %}
    
<div class="modal fade " id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-3">
            <div class="row mb-3">
                <div class = 'col'>
                    <p class="modal-title fs-5" id="staticBackdropLabel">Добавление инструктажа</p>
                </div>
                <div class = 'col-6' style ='max-width: 50px;'>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
            </div>
            <div id='body-form' class="modal-body">
                <form>{% csrf_token %} <div id = 'change-form'></div></form>
            </div>
            <div class= 'mx-auto mt-2'>
                <button type="button" id='start-button' data-bs-dismiss="modal" class="btn btn-primary">
                    <i class="fa-solid fa-bolt mx-2 text-warning"></i>
                    Сменить
                </button>
            </div>
        </div>
    </div>
</div>

<div style = 'max-width: 920px;'>
    <p class='text-uppercase text-dark' style="font-family: 'Inter-Bold';">Мои возможности</p>
    <div class = 'd-flex flex-wrap'>
        {% if user.is_superuser %}
        <div>
            <a href='#' class = 'btn btn-dark m-2' id="import-button">
                <i class="fa-regular fa-circle-down mx-1"></i>
                Импорт пользователей
            </a>
        </div>
        <div>
            <a class='btn btn-outline-dark m-2' href="{% url 'admin:index' %}">
                <i class="fa-solid fa-toolbox mx-2"></i>
                Панель администратора
            </a>
        </div>
        {% endif %}
        <div>
            <a class='btn btn-outline-dark m-2' href="{% url 'journal_view' %}">
                <i class="fa-solid fa-chart-gantt mx-2"></i>
                Журнал
            </a>
        </div>
        <div>
            <a class='btn btn-outline-dark m-2' href="{% url 'brief' %}">
                <i class="fa-solid fa-square-pen mx-1"></i>
                Инструктажи
            </a>
        </div>
        <div>
            <a class='btn btn-outline-dark m-2' href="{% url 'admin:index' %}">
                <i class="fa-regular fa-circle-plus mx-1"></i>
                Добавление инструктажей
            </a>
        </div>
    </div>
</div>
